<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ISA v0.5.1 — 语义场</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ISA">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #2d2d3a;
  --surface: #35354a;
  --surface2: #3d3d52;
  --surface3: #45455a;
  --border: #424258;
  --ink: #e8e8f0;
  --ink2: #9090aa;
  --ink3: #6a6a80;
  --accent: #6c5ce7;
  --accent2: #5a4bd4;
  --accent-glow: rgba(108,92,231,0.12);
  --green: #3ddc84;
  --green-bg: rgba(61,220,132,0.08);
  --yellow: #f0b429;
  --red: #e74c4c;
  --radius: 10px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "SF Pro", system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#connectOverlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(26,26,36,0.96); backdrop-filter:blur(20px);
  display:flex; align-items:center; justify-content:center;
}
.connect-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:36px;
  width:420px; max-width:90vw;
}
.connect-card h1 { font-size:1.6em; font-weight:700; letter-spacing:-0.5px; margin-bottom:4px; }
.connect-card .sub { color:var(--ink2); margin-bottom:24px; }
.connect-card label { display:block; font-size:0.8em; color:var(--ink3); margin-top:14px; margin-bottom:4px; }
.connect-card input {
  width:100%; padding:12px 14px; border-radius:8px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--ink); font-size:0.95em; outline:none;
}
.connect-card input:focus { border-color:var(--accent); }
.connect-card button {
  width:100%; margin-top:20px; padding:14px;
  border:none; border-radius:8px; background:var(--accent); color:white;
  font-size:1.05em; font-weight:600; cursor:pointer;
}
.connect-card button:hover { background:var(--accent2); }
.connect-card .status { margin-top:12px; font-size:0.9em; text-align:center; }
.connect-card .status.error { color:var(--red); }
.connect-card .status.success { color:var(--green); }

/* 双栏布局 */
.app { display:flex; height:100vh; width:100vw; }

/* ── 左侧栏 ── */
.sidebar {
  width:300px; min-width:300px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
}
.sidebar-header {
  padding:18px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.sidebar-header .logo { font-size:1.3em; font-weight:700; }
.sidebar-header .badge {
  font-size:0.7em; padding:2px 10px; border-radius:20px;
  background:var(--accent-glow); color:var(--accent); font-weight:600;
}
.user-info {
  padding:14px 20px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border);
}
.user-dot { width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0; }
.user-name { font-size:1em; font-weight:600; }
.user-channel { font-size:0.8em; color:var(--ink3); margin-left:auto; }

/* 频道列表 */
.channels { padding:14px 16px; border-bottom:1px solid var(--border); }
.channels .label {
  font-size:0.7em; color:var(--ink3); text-transform:uppercase;
  letter-spacing:0.8px; margin-bottom:8px;
}
.channel-item {
  padding:10px 14px; border-radius:8px;
  display:flex; align-items:center; gap:10px;
  cursor:pointer; font-size:0.95em; transition:background 0.15s;
}
.channel-item:hover { background:var(--surface2); }
.channel-item.active { background:var(--accent-glow); color:var(--accent); font-weight:600; }
.channel-item .count {
  margin-left:auto; font-size:0.8em; color:var(--ink3);
  background:var(--surface3); padding:2px 10px; border-radius:12px;
}

/* Agent列表 */
.agent-list {
  flex:1; overflow-y:auto; padding:10px 12px 12px;
}
.agent-list .label {
  font-size:0.7em; color:var(--ink3); text-transform:uppercase;
  letter-spacing:0.8px; padding:0 8px; margin:12px 0 8px;
}
.agent-item {
  padding:10px 12px; border-radius:8px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:all 0.15s;
}
.agent-item:hover { background:var(--surface2); }
.agent-item.selected { background:var(--accent-glow); }
.agent-item .dot {
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.agent-item .dot.online { background:var(--green); }
.agent-item .dot.offline { background:var(--ink3); }
.agent-item .name { font-size:0.95em; font-weight:500; }
.agent-item .role { font-size:0.75em; color:var(--ink3); margin-left:auto; }

/* ── 主消息区 ── */
.main { flex:1; display:flex; flex-direction:column; min-width:0; }
.chat-header {
  padding:16px 24px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.chat-header .title { font-weight:600; font-size:1em; }
.chat-header .sub { font-size:0.8em; color:var(--ink3); }
.chat-header .conn-status {
  margin-left:auto; font-size:0.75em; display:flex; align-items:center; gap:6px;
}
.conn-led { width:8px;height:8px;border-radius:50%;display:inline-block; }
.conn-led.on { background:var(--green); }
.conn-led.off { background:var(--red); }

/* 消息区 */
.messages {
  flex:1; overflow-y:auto; padding:20px 24px;
  display:flex; flex-direction:column; gap:8px;
}
.msg {
  max-width:80%; padding:12px 16px;
  border-radius:var(--radius); font-size:0.95em; line-height:1.6;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn { from{opacity:0;transform:translateY(4px)} }
.msg.incoming {
  align-self:flex-start; background:var(--surface2);
  border-bottom-left-radius:4px;
}
.msg.outgoing {
  align-self:flex-end; background:var(--accent);
  border-bottom-right-radius:4px;
}
.msg.system {
  align-self:center; background:transparent;
  color:var(--ink3); font-size:0.8em; padding:6px 8px; max-width:100%;
}
.msg .sender { font-size:0.75em; font-weight:600; margin-bottom:4px; opacity:0.7; }
.msg .time { font-size:0.65em; opacity:0.5; margin-top:6px; text-align:right; }
.msg .brain-tag {
  font-size:0.65em; color:var(--accent); background:var(--accent-glow);
  padding:2px 8px; border-radius:8px; margin-left:8px;
}
.msg img {
  max-width:280px; max-height:280px; border-radius:8px;
  display:block; margin-top:4px; cursor:pointer;
}

/* 输入区 */
.input-area {
  padding:14px 24px; border-top:1px solid var(--border);
  display:flex; gap:8px; align-items:center;
  background:var(--surface);
  z-index:10;
}
.input-area .dm-tag {
  font-size:0.75em; color:var(--accent); background:var(--accent-glow);
  padding:6px 12px; border-radius:20px; white-space:nowrap;
  display:none; font-weight:600;
}
.input-area input {
  flex:1; padding:12px 18px; border-radius:24px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--ink); font-size:0.95em; outline:none;
}
.input-area input:focus { border-color:var(--accent); }
.input-area input::placeholder { color:var(--ink3); }
.input-area .file-btn {
  background:var(--surface3); border:1px solid var(--border);
  color:var(--ink2); padding:10px 14px; border-radius:24px;
  cursor:pointer; font-size:1.1em; transition:all 0.15s;
}
.input-area .file-btn:hover { background:var(--border); color:var(--ink); }
#fileInput { display:none; }
.input-area .send-btn {
  padding:12px 24px; border:none; border-radius:24px;
  background:var(--accent); color:white; font-size:0.95em;
  font-weight:600; cursor:pointer; transition:all 0.15s;
  min-width:72px;
  flex-shrink:0;
}
.input-area .send-btn:hover { background:var(--accent2); transform:scale(1.02); }

@media (max-width:640px) {
  .sidebar { display:none; }
  .messages { padding:14px; }
  .input-area { padding:10px 14px; }
}
</style>
</head>
<body>

<div id="connectOverlay">
  <div class="connect-card">
    <h1>🌊 ISA</h1>
    <div class="sub">语义共振场</div>
    <label>你的名字</label>
    <input id="agentIdInput" placeholder="输入名称" value="成市">
    <label>Gateway</label>
    <input id="gatewayUrlInput" value="ws://localhost:8765">
    <label>频道</label>
    <input id="channelInput" value="projects">
    <button onclick="doConnect()">接入</button>
    <div class="status" id="connectStatus"></div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  
  <!-- 左栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="logo">🌊 ISA</span>
      <span class="badge">v0.5</span>
    </div>
    <div class="user-info">
      <span class="user-dot"></span>
      <span class="user-name" id="myName">—</span>
      <span class="user-channel" id="myChannel">#projects</span>
    </div>
    <div class="channels">
      <div class="label">频道</div>
      <div class="channel-item active" onclick="switchChan('projects')">
        <span>📡 projects</span><span class="count" id="cntProjects">0</span>
      </div>
      <div class="channel-item" onclick="switchChan('main')">
        <span>💬 main</span><span class="count" id="cntMain">0</span>
      </div>
    </div>
    <div class="agent-list" id="agentList">
      <div class="label">👥 Agent</div>
    </div>
  </div>

  <!-- 主区 -->
  <div class="main">
    <div class="chat-header">
      <span class="title" id="chatTitle">📡 语义场</span>
      <span class="sub" id="chatSub">#projects</span>
      <div class="conn-status">
        <span class="conn-led on" id="connLed"></span>
        <span id="connText">在线</span>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="msg system">接入Gateway后开始聊天。点击左侧Agent发起私聊。</div>
    </div>
    <div class="input-area">
      <span class="dm-tag" id="dmTag"></span>
      <span class="file-btn" onclick="document.getElementById('fileInput').click()" title="发送图片或文件">📎</span>
      <input type="file" id="fileInput" multiple onchange="onFileSelect(event)">
      <input id="msgInput" placeholder="写消息..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
let ws = null, myId = '', myChannel = 'projects', dmTarget = null;
let peers = {}, reconnectDelay = 3, savedKw = {}, savedUrl = '';
const $ = id => document.getElementById(id);

function doConnect() {
  myId = $('agentIdInput').value.trim() || 'anon';
  const url = $('gatewayUrlInput').value.trim() || 'ws://localhost:8765';
  myChannel = $('channelInput').value.trim() || 'projects';
  const kw = $('keywordsInput')?.value?.trim() || '';
  savedKw = {}; kw.split(/[,，\s]+/).forEach(w => { if(w) savedKw[w.trim()]=0.5+Math.random()*0.5; });
  savedUrl = url; reconnectDelay = 3;
  $('myName').textContent = myId;
  $('myChannel').textContent = '#'+myChannel;
  $('chatSub').textContent = '#'+myChannel;
  $('connectStatus').textContent = '连接中...';
  _connect(url, myChannel, myId, savedKw);
}

function _connect(url, channel, id, kw) {
  try {
    ws = new WebSocket(`${url}/isa/channel/${channel}`);
    ws.onopen = () => ws.send(JSON.stringify({type:'register',agent_id:id,channel:channel,keywords:kw}));
    ws.onmessage = e => handleMsg(JSON.parse(e.data));
    ws.onerror = () => { $('connectStatus').textContent='连接失败'; $('connectStatus').className='status error'; };
    ws.onclose = () => {
      $('connLed').className='conn-led off'; $('connText').textContent='断开';
      $('connectStatus').textContent=`断开·${reconnectDelay}s重连`; $('connectStatus').className='status error';
      setTimeout(() => { reconnectDelay=Math.min(reconnectDelay*1.5,30); _connect(savedUrl,myChannel,myId,savedKw); }, reconnectDelay*1000);
    };
  } catch(e) { $('connectStatus').textContent='连接失败'; $('connectStatus').className='status error'; }
}

function handleMsg(msg) {
  switch(msg.type) {
    case 'registered':
      $('connectOverlay').style.display='none'; $('app').style.display='flex';
      $('connText').textContent='在线'; $('connLed').className='conn-led on';
      (msg.peers||[]).forEach(p => { peers[p]={online:true}; });
      renderAgents(); renderChannelCounts(msg);
      addSysMsg(`🌊 已接入 #${myChannel} · ${msg.peer_count}个Agent`);
      break;
    case 'presence':
      peers[msg.source] = {...(peers[msg.source]||{}), online:msg.status==='online'};
      renderAgents();
      addSysMsg(`${msg.status==='online'?'🟢':'⚫'} ${msg.source}`);
      break;
    case 'message':
      const src = msg.source || '?';
      // 只显示非自己的消息（自己发的已在sendMsg中显示）
      if (src !== myId) addMsg(src, msg.body, msg);
      break;
    case 'wink': addSysMsg(`⚡ ${msg.source}: ${msg.body}`); break;
    case 'resonance': addSysMsg(`~ ${msg.source}: ${msg.body.substring(0,80)}`); break;
  }
}

function renderAgents() {
  const list = $('agentList');
  // 项目Agent固定
  const agents = [
    {name:'老搭档',role:'协作',on:peers['老搭档']?.online},
    {name:'isa',role:'架构',on:peers['isa']?.online},
    {name:'ios',role:'治理',on:peers['ios']?.online},
    {name:'ita',role:'Token',on:peers['ita']?.online},
    {name:'iat',role:'压缩',on:peers['iat']?.online},
    {name:'iah',role:'解剖',on:peers['iah']?.online},
    {name:'idc',role:'三系统',on:peers['idc']?.online},
    {name:'iko',role:'交付',on:peers['iko']?.online},
    {name:'搜神',role:'情报',on:peers['搜神']?.online},
  ];
  let html = '<div class="label">👥 项目Agent</div>';
  agents.forEach(a => {
    const on = a.on !== undefined ? a.on : true;
    const sel = dmTarget === a.name ? ' selected' : '';
    html += `<div class="agent-item${sel}" onclick="startDM('${a.name}')">
      <span class="dot ${on?'online':'offline'}"></span>
      <span class="name">${a.name}</span>
      <span class="role">${a.role}</span></div>`;
  });
  // 其他
  const others = Object.keys(peers).filter(n => !agents.find(a=>a.name===n));
  if (others.length) {
    html += '<div class="label">其他</div>';
    others.forEach(n => {
      const sel = dmTarget === n ? ' selected' : '';
      html += `<div class="agent-item${sel}" onclick="startDM('${n}')">
        <span class="dot ${peers[n]?.online?'online':'offline'}"></span>
        <span class="name">${n}</span></div>`;
    });
  }
  list.innerHTML = html;
}

function renderChannelCounts(msg) {
  const cnt = Object.values(msg.peer_agents || {}).length || 0;
  $('cntProjects').textContent = cnt || '9';
}

// ── 私聊功能 ──
function startDM(name) {
  dmTarget = name;
  $('chatTitle').textContent = `💬 ${name}`;
  $('chatSub').textContent = `私聊 · 点击取消`;
  $('dmTag').textContent = `→ ${name}`;
  $('dmTag').style.display = 'inline';
  $('msgInput').placeholder = `给${name}发消息...`;
  renderAgents(); // 更新selected状态
  addSysMsg(`💬 已切换到与 ${name} 的私聊`);
}

function cancelDM() {
  dmTarget = null;
  $('chatTitle').textContent = '📡 语义场';
  $('chatSub').textContent = '#'+myChannel;
  $('dmTag').style.display = 'none';
  $('msgInput').placeholder = '写消息...';
  renderAgents();
}

// ── 文件上传 ──
let pendingFiles = [];
function onFileSelect(e) {
  const files = e.target.files;
  if (!files.length) return;
  pendingFiles = Array.from(files);
  const names = pendingFiles.map(f => f.name).join(', ');
  addSysMsg(`📎 待发送: ${names} (点发送送出)`);
}

// ── 发送消息 ──
function sendMsg() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text && !pendingFiles.length) return;
  if (!ws) return;

  // 发文本
  if (text) {
    const target = dmTarget || '*';
    ws.send(JSON.stringify({type:'message', target, body:text, importance:0.5}));
    addMsg(myId, text, {target});
    input.value = '';
  }
  
  // 发文件（base64编码）
  pendingFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const b64 = e.target.result;
      const target = dmTarget || '*';
      ws.send(JSON.stringify({
        type:'message', target, body:`[文件: ${file.name}]`,
        meta:{filename:file.name, filetype:file.type, filedata:b64}
      }));
      addMsg(myId, `📎 ${file.name}`, {target});
    };
    reader.readAsDataURL(file);
  });
  pendingFiles = [];
}

// ── 消息UI ──
function addMsg(source, body, meta) {
  const div = document.createElement('div');
  const isMe = source === myId;
  div.className = `msg ${isMe?'outgoing':'incoming'}`;
  const ts = new Date().toTimeString().substring(0,5);
  const isDM = meta && meta.target && meta.target !== '*';
  let content = escapeHtml(body);
  // 检测图片
  if (body.startsWith('data:image')) {
    content = `<img src="${body}" onclick="this.classList.toggle('full')">`;
  }
  div.innerHTML = `<div class="sender">${source}${isDM?' → '+escapeHtml(meta.target):''}</div>
    ${content}<div class="time">${ts}</div>`;
  $('messages').appendChild(div);
  $('messages').scrollTop = $('messages').scrollHeight;
}

function addSysMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  $('messages').appendChild(div);
  $('messages').scrollTop = $('messages').scrollHeight;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function switchChan(ch) {
  if (ch === myChannel) return;
  myChannel = ch; dmTarget = null;
  $('myChannel').textContent = '#'+ch;
  $('chatTitle').textContent = ch === 'projects' ? '📡 语义场' : '💬 公共频道';
  document.querySelectorAll('.channel-item').forEach(el => el.classList.toggle('active', el.textContent.includes(ch)));
  addSysMsg(`📡 切换到 #${ch}`);
  ws.close(); _connect(savedUrl, ch, myId, savedKw);
}

// 自动检测
fetch('/isa/status').then(r=>r.json()).then(s => {
  const cnt = Object.values(s.channels||{}).reduce((a,c)=>a+(c.member_count||0), 0);
  $('connectStatus').textContent = `🟢 Gateway在线 · 共${cnt}个Agent`;
  $('connectStatus').className = 'status success';
}).catch(() => { $('connectStatus').textContent='⚪ 检测Gateway...'; });
</script>
</body>
</html>
